<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; }
        .container { width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        h1 { text-align: center; }

        input, select {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
        }

        button {
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            width: 100%;
        }

        .task {
            margin-top: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
        }

        .done { text-decoration: line-through; color: gray; }

        .high { border-left: 5px solid red; }
        .medium { border-left: 5px solid orange; }
        .low { border-left: 5px solid green; }

        .filters a {
            margin: 5px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Task Manager</h1>

    <form action="/add" method="post">
        <input type="text" name="task" placeholder="Task" required>

        <select name="priority">
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
        </select>

        <input type="date" name="due_date">

        <button>Add Task</button>
    </form>

    <div class="filters">
        <a href="/">All</a>
        <a href="/?filter=pending">Pending</a>
        <a href="/?filter=done">Done</a>
    </div>

    {% for task in tasks %}
    <div class="task {{ task['priority']|lower }}">
        <span class="{{ 'done' if task['status']=='Done' else '' }}">
            {{ task['task'] }}
        </span>
        <br>
        <small>Priority: {{ task['priority'] }} | Due: {{ task['due_date'] }}</small>
        <br>
        <a href="/toggle/{{ task['id'] }}">Toggle</a>
        <a href="/delete/{{ task['id'] }}">Delete</a>
    </div>
    {% endfor %}
</div>

</body>
</html>
